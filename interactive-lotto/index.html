<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테마 로또 - 성향 맞춤 행운 생성기</title>
    <meta name="description" content="자신의 성향에 맞는 기운(종교, 우주, 운세)을 선택하여 나만의 로또 번호를 추출하세요.">
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Noto+Sans+KR:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body class="theme-default">
    <div id="app">
        <!-- 0단계: 테마(성향) 선택 화면 -->
        <section id="stage-0" class="stage active">
            <h1 class="title">행운의 근원</h1>
            <p class="subtitle">어떤 기운으로 행운의 번호를 만드시겠습니까?</p>
            
            <div class="theme-grid">
                <button class="theme-btn" data-theme="bible">
                    <span class="icon">📖</span>
                    <span class="theme-name">성경 구절</span>
                    <span class="theme-desc">말씀의 힘으로</span>
                </button>
                <button class="theme-btn" data-theme="buddha">
                    <span class="icon">🪷</span>
                    <span class="theme-name">불경 구절</span>
                    <span class="theme-desc">마음의 평화로</span>
                </button>
                <button class="theme-btn" data-theme="universe">
                    <span class="icon">🌌</span>
                    <span class="theme-name">우주의 기운</span>
                    <span class="theme-desc">우주의 섭리로</span>
                </button>
                <button class="theme-btn" data-theme="tarot">
                    <span class="icon">🔮</span>
                    <span class="theme-name">신비한 타로</span>
                    <span class="theme-desc">운명의 흐름으로</span>
                </button>
            </div>
            
            <!-- 애드센스 (메인화면 하단) -->
            <div class="ad-placeholder mt-auto">
                <p>Google AdSense</p>
            </div>
        </section>

        <!-- 1단계: 난수(Seed) 생성 화면 (테마별로 내용 바뀜) -->
        <section id="stage-1" class="stage">
            <h1 class="title" id="stage1-title">에너지 모으기</h1>
            <p class="subtitle" id="stage1-subtitle">안내에 따라 행운을 모아주세요.</p>
            
            <!-- 동적 상호작용 영역 -->
            <div id="interaction-area" class="interaction-area">
                <!-- JS에서 테마별 UI를 주입합니다 -->
            </div>
            
            <div class="progress-wrapper">
                <div class="progress-bar-container">
                    <div class="progress-bar" id="seed-progress"></div>
                </div>
                <p id="energy-text" class="glow-text">0%</p>
            </div>
        </section>

        <!-- 2, 3단계: 후보군 생성 및 번호 선택 화면 -->
        <section id="stage-2" class="stage">
            <h1 class="title">직관의 시간</h1>
            <p class="subtitle">당신의 기운이 담긴 별 중 6개를 선택하세요.</p>
            
            <div id="orb-field"></div>
            
            <div class="selection-slots">
                <div class="slot" data-index="0"></div>
                <div class="slot" data-index="1"></div>
                <div class="slot" data-index="2"></div>
                <div class="slot" data-index="3"></div>
                <div class="slot" data-index="4"></div>
                <div class="slot" data-index="5"></div>
            </div>
        </section>

        <!-- 4단계: 최종 결과 화면 -->
        <section id="stage-3" class="stage">
            <h1 class="title glow-text-intense">당신의 로또 번호</h1>
            <p class="subtitle" id="result-message">행운이 함께하시길 바랍니다.</p>
            
            <div class="result-container" id="result-numbers">
            </div>
            
            <div class="action-buttons">
                <button id="btn-copy" class="btn primary">번호 복사하기</button>
                <button id="btn-retry" class="btn secondary">처음으로</button>
            </div>
            
            <!-- 애드센스 -->
            <div class="ad-placeholder">
                <p>Google AdSense</p>
            </div>
        </section>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
